      <stop offset="1" stop-color="#8157d9"/>
    </linearGradient>
    <linearGradient id="wordGradient" x1="344" y1="85" x2="780" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12344d"/>
      <stop offset="0.58" stop-color="#2856c8"/>
      <stop offset="1" stop-color="#6c47b8"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#12344d" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="960" height="260" rx="34" fill="#f7fbff"/>

