<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">LaMoFCBench logo</title>
  <desc id="desc">A multimodal feature coding benchmark logo with feature streams entering a codec core.</desc>
  <defs>
    <linearGradient id="coreGradient" x1="155" y1="64" x2="292" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2bd4bd"/>
